name: Overwatch Update Monitor

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Update Monitor Script
        id: check_update
        run: node .github/scripts/monitor.js

      - name: Commit and Push Changes
        if: steps.check_update.outputs.updated == 'true'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add config.js current_build.txt
          git commit -m "Auto-Lock: Overwatch Update Detected 🚨"
          git push
