<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column - Global Chat</title>

    <!-- Discord / Social Media Meta Tags -->
    <meta property="og:title" content="Column | Global Chat">
    <meta property="og:description" content="Join the live discussion with other Column users.">
    <meta property="og:image" content="https://raw.githubusercontent.com/columnndev/column/main/logo.png">
    <meta property="og:url" content="https://columnndev.github.io/column/chat.html">
    <meta name="theme-color" content="#4f46e5">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="security.js"></script>
    <style>
        .chat-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 8rem 2rem 4rem;
            position: relative;
            z-index: 10;
        }
        
        .chat-card {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            background: rgba(15, 15, 22, 0.7);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            height: 75vh;
        }
        
        .chat-header {
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h1 {
            font-size: 2rem;
            margin-bottom: 0.2rem;
        }
        
        .chat-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .chat-box-wrapper {
            flex-grow: 1;
            border-radius: 12px;
            overflow: hidden;
            background: #111;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #tlkio {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="ambient-background">
        <canvas id="rain-canvas"></canvas>
    </div>
    
    <!-- Navbar -->
    <header class="navbar" data-aos="fade-down" data-aos-duration="800">
        <div class="nav-container">
            <div class="logo-wrapper" style="display: flex; align-items: center; gap: 0.8rem;">
                <img src="logo.png" alt="Column Logo" class="logo-img" style="height: 40px; width: auto; object-fit: contain; mix-blend-mode: screen;">
                <span class="logo">COLUMN</span>
            </div>
            <nav class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="index.html#features">Features</a>
                <a href="index.html#pricing">Pricing</a>
                <a href="status.html">Status</a>
                <a href="chat.html" class="active">Chat</a>
            </nav>
            <div class="nav-actions">
                <a href="login.html" class="btn-secondary desktop-only">Portal</a>
                <a href="index.html#pricing" class="btn-primary desktop-only">Purchase</a>
            </div>
        </div>
    </header>

    <main class="chat-container">
        <div class="chat-card" data-aos="fade-up" data-aos-duration="1000">
            <div class="chat-header">
                <div>
                    <h1>Global <span class="text-gradient">Chat</span></h1>
                    <p>Discuss, get help, or just hang out with the community.</p>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="display: block; width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: pulse-green 2s infinite;"></span>
                    <span style="color: var(--text-muted); font-size: 0.9rem;">Live Room</span>
                </div>
            </div>
            
            <div class="chat-box-wrapper" data-aos="fade-up" data-aos-delay="200">
                <div id="tlkio" data-channel="column-live-chat" data-theme="theme--night"></div>
            </div>
        </div>
    </main>

    <script async src="https://tlk.io/wrapper.js"></script>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('rain-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;
            
            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            });

            const characters = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*'.split('');
            const fontSize = 16;
            let columns = width / fontSize;
            let drops = [];
            for (let x = 0; x < columns; x++) { drops[x] = 1; }

            function drawRain() {
                ctx.fillStyle = 'rgba(5, 5, 8, 0.1)';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = '#4f46e5';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = characters[Math.floor(Math.random() * characters.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(drawRain, 35);
        }
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: true,
            offset: 50,
            duration: 800,
            easing: 'ease-out-cubic',
        });
    </script>
    <style>
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</body>
</html>
