<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column - Login</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .login-header .logo-wrapper {
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        
        .login-header h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .input-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .input-control:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }
        
        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            min-height: 20px;
            display: none;
        }
        
        #dashboard-view {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .dashboard-info {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .info-row:last-child {
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .info-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .info-value {
            font-weight: 600;
            color: white;
        }
        
        .success-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .loader-icon {
            display: none;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="ambient-background">
        <canvas id="rain-canvas"></canvas>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>
    
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo-wrapper" style="display: flex; align-items: center; gap: 0.8rem;">
                <img src="logo.png" alt="Column Logo" class="logo-img" style="height: 40px; width: auto; object-fit: contain; mix-blend-mode: screen;">
                <span class="logo">COLUMN</span>
            </div>
            <nav class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="index.html#features">Features</a>
                <a href="index.html#pricing">Pricing</a>
                <a href="index.html#faq">FAQ</a>
            </nav>
            <div class="nav-actions">
                <a href="index.html#pricing" class="btn-secondary desktop-only">Purchase</a>
            </div>
        </div>
    </header>

    <main class="login-container">
        <!-- Login Form -->
        <div id="login-view" class="login-card glass-panel">
            <div class="login-header">
                <div class="logo-wrapper" style="display: flex; align-items: center; gap: 0.8rem;">
                    <img src="logo.png" alt="Column Logo" class="logo-img" style="height: 40px; width: auto; object-fit: contain; mix-blend-mode: screen;">
                    <span class="logo">COLUMN</span>
                </div>
                <h2>Client Portal</h2>
                <p>Enter your license key to access the loader.</p>
            </div>
            
            <div class="error-message" id="error-msg">Invalid key provided.</div>
            
            <div class="input-group">
                <label for="license-key">License Key</label>
                <input type="text" id="license-key" class="input-control" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false">
            </div>
            
            <button id="login-btn" class="btn-primary btn-block btn-large">
                <span id="login-text">Authenticate</span>
                <svg class="loader-icon" id="login-loader" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-dashoffset="0"></circle></svg>
            </button>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="login-card glass-panel">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Your license is currently active.</p>
            </div>
            
            <div class="dashboard-info">
                <div class="info-row">
                    <span class="info-label">Status</span>
                    <span class="success-badge">Valid</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Key</span>
                    <span class="info-value" id="display-key" style="font-family: monospace; font-size: 0.85rem;">...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Expires</span>
                    <span class="info-value" id="display-expiry">...</span>
                </div>
            </div>
            
            <button id="download-btn" class="btn-primary btn-block btn-large btn-glow" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download Loader
            </button>
            <button id="logout-btn" class="btn-secondary btn-block">Logout</button>
        </div>
    </main>

    <!-- Matrix Rain Canvas Script -->
    <script>
        // Matrix Rain
        const canvas = document.getElementById('rain-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;
            
            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            });

            const characters = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*'.split('');
            const fontSize = 16;
            let columns = width / fontSize;
            let drops = [];
            for (let x = 0; x < columns; x++) { drops[x] = 1; }

            function drawRain() {
                ctx.fillStyle = 'rgba(5, 5, 8, 0.1)';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = '#4f46e5';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = characters[Math.floor(Math.random() * characters.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(drawRain, 35);
        }

        // KeyAuth Logic
        const API_URL = "https://keyauth.win/api/1.2/";
        const APP_NAME = "column ow";
        const OWNER_ID = "msmJ8x5So5";
        const APP_VERSION = "1.0";

        const loginBtn = document.getElementById('login-btn');
        const loginText = document.getElementById('login-text');
        const loginLoader = document.getElementById('login-loader');
        const licenseKeyInput = document.getElementById('license-key');
        const errorMsg = document.getElementById('error-msg');
        
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const displayKey = document.getElementById('display-key');
        const displayExpiry = document.getElementById('display-expiry');
        const downloadBtn = document.getElementById('download-btn');
        const logoutBtn = document.getElementById('logout-btn');

        // A simple HWID generation for browser (usually localstorage based)
        let hwid = localStorage.getItem('hwid');
        if (!hwid) {
            hwid = 'browser-' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('hwid', hwid);
        }

        async function keyAuthInit() {
            try {
                const url = `${API_URL}?type=init&ver=${APP_VERSION}&name=${encodeURIComponent(APP_NAME)}&ownerid=${OWNER_ID}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.success) {
                    return data.sessionid;
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                console.error("Init Error:", err);
                throw new Error("Failed to connect to authentication server.");
            }
        }

        async function keyAuthLogin(key, sessionId) {
            try {
                const url = `${API_URL}?type=license&key=${encodeURIComponent(key)}&sessionid=${sessionId}&name=${encodeURIComponent(APP_NAME)}&ownerid=${OWNER_ID}&hwid=${hwid}`;
                const res = await fetch(url);
                const data = await res.json();
                return data;
            } catch (err) {
                console.error("Login Error:", err);
                throw new Error("Failed to verify license key.");
            }
        }

        function formatExpiry(unixTimestamp) {
            if (!unixTimestamp) return "Lifetime / Unknown";
            const date = new Date(unixTimestamp * 1000);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }

        loginBtn.addEventListener('click', async () => {
            const key = licenseKeyInput.value.trim();
            if (!key) {
                showError("Please enter a license key.");
                return;
            }

            setLoading(true);
            try {
                const sessionId = await keyAuthInit();
                const result = await keyAuthLogin(key, sessionId);

                if (result.success) {
                    // Success!
                    localStorage.setItem('saved_license', key);
                    
                    let expiryTimestamp = null;
                    if (result.info && result.info.subscriptions && result.info.subscriptions.length > 0) {
                        expiryTimestamp = result.info.subscriptions[0].expiry;
                    }

                    showDashboard(key, formatExpiry(expiryTimestamp));
                } else {
                    showError(result.message || "Invalid license key.");
                }
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            // shake effect
            loginView.style.transform = 'translateX(-5px)';
            setTimeout(() => loginView.style.transform = 'translateX(5px)', 50);
            setTimeout(() => loginView.style.transform = 'translateX(-5px)', 100);
            setTimeout(() => loginView.style.transform = 'translateX(5px)', 150);
            setTimeout(() => loginView.style.transform = 'translateX(0)', 200);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                loginText.textContent = "Verifying...";
                loginLoader.style.display = "block";
                loginBtn.disabled = true;
                errorMsg.style.display = 'none';
            } else {
                loginText.textContent = "Authenticate";
                loginLoader.style.display = "none";
                loginBtn.disabled = false;
            }
        }

        function showDashboard(key, expiry) {
            loginView.style.display = 'none';
            dashboardView.style.display = 'flex';
            
            // Mask the key
            const masked = key.substring(0, 4) + "-XXXX-XXXX-" + key.substring(key.length - 4);
            displayKey.textContent = masked;
            displayExpiry.textContent = expiry;
        }

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('saved_license');
            licenseKeyInput.value = '';
            dashboardView.style.display = 'none';
            loginView.style.display = 'flex';
        });

        downloadBtn.addEventListener('click', () => {
            // Ideally, this would be the actual download link for the loader.
            // Using a placeholder or an API request to get the download file.
            alert("Downloading loader...");
            // window.location.href = "YOUR_LOADER_LINK";
        });

        // Auto-login if key is saved
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('saved_license');
            if (saved) {
                licenseKeyInput.value = saved;
            }
        });
    </script>
</body>
</html>
